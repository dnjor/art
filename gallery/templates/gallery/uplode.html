{% extends "accounts/layout.html" %}

{% block title %}رفع لوحة{% endblock %}

{% block body %}
    <section class="auth-card stack">
        <div>
            <h1 class="page-title">رفع لوحة</h1>
            <p class="page-subtitle">أضف عملاً فنياً جديداً مع صورة ووصف واضحين.</p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <p>
                <label for="title">العنوان</label>
                <input type="text" name="title" id="title">
            </p>
            <p>
                <label for="painting">اللوحة</label>
                <input type="file" name="painting" id="painting">
            </p>
            <p>
                <label for="description">الوصف</label>
                <textarea name="description" id="description"></textarea>
            </p>
            <button type="submit">رفع</button>
        </form>
    </section>
{% endblock %}
