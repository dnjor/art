{% extends "accounts/layout.html" %}

{% block title %}تحديث لوحة{% endblock %}

{% block body %}
    <section class="auth-card stack">
        <div>
            <h1 class="page-title">تحديث لوحة</h1>
            <p class="page-subtitle">قم بتعديل بيانات اللوحة الحالية دون كسر تنسيق الصفحة على الهاتف أو الحاسوب.</p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <p>
                <label for="title">العنوان</label>
                <input type="text" name="title" id="title" value="{{ painting.title }}">
            </p>
            <p>
                <label for="painting">اللوحة</label>
                <input type="file" name="painting" id="painting">
            </p>
            <p>
                <label for="description">الوصف</label>
                <textarea name="description" id="description">{{ painting.description }}</textarea>
            </p>
            <button type="submit">تحديث</button>
        </form>
    </section>
{% endblock %}
