{% extends "account/index.html" %}

{% block title %} Register {% endblock %}

<style>
    .helptext {
        display: none;
    }
</style>

{% block body %}
    <h1>Register</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
{% endblock %}
