{% extends "account/index.html" %}

{% block title %} انشاء حساب {% endblock %}
<!-- register page-->

<style>
    .helptext {
        display: none;
    }
</style>

{% block body %}
    <h1>انشاء حساب</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">انشاء حساب</button>
    </form>
    <p>هل لديك حساب بالفعل؟ <a href="{% url 'login' %}">تسجيل دخول</a></p>
{% endblock %}
