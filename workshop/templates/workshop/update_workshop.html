<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <title>تعديل ورشة عمل</title>
    </head>
    <body>
        <h1>تعديل ورشة عمل</h1>

        <p><a href="{% url 'workshop_list' %}">العودة إلى ورش العمل</a></p>

        <form action="{% url 'update_workshop' workshop.id %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">حفظ التعديلات</button>
        </form>
    </body>
</html>
