{% extends "accounts/layout.html" %}

{% block title %}إكمال بيانات الحساب{% endblock %}

{% block body %}
    <section class="auth-card stack">
        <div>
            <h1 class="page-title">إكمال بيانات الحساب</h1>
            <p class="page-subtitle">نحتاج إلى بعض التفاصيل الإضافية لإكمال حسابك وتأمين التواصل بخصوص الورش والمدفوعات.</p>
        </div>

        <form method="post" action="{% url 'accounts:login_incomplete' %}">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-field form-field--full">
                    <label for="phone_number">رقم الهاتف</label>
                    <input type="text" id="phone_number" name="phone_number" maxlength="10" required>
                </div>

                <div class="field-checkbox">
                    <input type="checkbox" id="notifications" name="notifications">
                    <label for="notifications">تلقي الإشعارات البريدية</label>
                </div>
            </div>

            <button type="submit">حفظ البيانات</button>
        </form>
    </section>
{% endblock %}
